name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Lint
      run: npm run lint
      continue-on-error: true

    - name: Build
      run: npm run build
      env:
        # Mocking variables for build process if needed
        VITE_FIREBASE_API_KEY: "mock_key"
        VITE_FIREBASE_AUTH_DOMAIN: "mock.firebaseapp.com"
        VITE_FIREBASE_PROJECT_ID: "mock-project"
